<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .hidden.md\:block.overflow-y-auto {
            overflow-y: hidden !important;
        }

        .hidden.md\:block.overflow-y-auto table {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .hidden.md\:block.overflow-y-auto thead {
            display: block;
            flex-shrink: 0;
            scrollbar-gutter: stable;
        }

        .hidden.md\:block.overflow-y-auto tbody {
            display: block;
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-gutter: stable;
        }

        .hidden.md\:block.overflow-y-auto tr {
            display: flex;
            width: 100%;
        }

        .hidden.md\:block.overflow-y-auto th,
        .hidden.md\:block.overflow-y-auto td {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
        }

        th:nth-child(1), td:nth-child(1) { flex: 1.0; }
        th:nth-child(2), td:nth-child(2) { flex: 1.2; }
        th:nth-child(3), td:nth-child(3) { flex: 2.2; }
        th:nth-child(4), td:nth-child(4) { flex: 1.8; }
        th:nth-child(5), td:nth-child(5) { flex: 1.2; justify-content: flex-end; text-align: right; }

        input,
        textarea,
        select,
        [contenteditable="true"] {
            user-select: text !important;
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar {
            width: 240px;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }

        main {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }

        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        *::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 4px; background-clip: padding-box; border: 2px solid transparent; }
        *::-webkit-scrollbar-thumb:hover { background: #1d4ed8; }

        .document-row {
            transition: all 0.15s ease;
            cursor: pointer;
        }

        .document-row:hover {
            background: #f0f7ff;
        }

        .document-row:focus {
            outline: 2px solid #2563eb;
            outline-offset: -2px;
            background: #eff6ff;
        }

        button,
        [role="button"] {
            cursor: pointer !important;
        }
    </style>
    <title>Documents</title>
</head>

<body class="bg-gray-100">

    <!-- Fixed Header -->
    <header class="fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-30 h-24 flex items-center px-4">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-3">
                <img src="../assets/icon.png" alt="Shresht Management Icon" class="h-10 w-10 object-contain">
                <h1 class="text-xl font-bold text-gray-800" id="header-title">Documents</h1>
            </div>
            <div class="flex items-center gap-3">
                <button id="new-document-btn"
                    class="bg-blue-600 text-white px-4 h-10 rounded-lg hover:bg-blue-700 flex items-center gap-2 font-medium text-sm transition-all duration-150 active:scale-95 cursor-pointer shadow-sm"
                    title="New Document (Ctrl+N)">
                    <i class="fas fa-plus"></i>
                    New Document
                </button>
                <button id="trash-restore-all-btn"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 h-10 rounded-lg flex items-center gap-2 font-semibold transition-all duration-150 active:scale-95 cursor-pointer shadow-sm text-sm"
                    style="display: none;" title="Restore All">
                    <i class="fas fa-trash-restore"></i>
                    <span>Restore All</span>
                </button>
                <button id="showDeletedBtn"
                    class="bg-gray-200 text-gray-700 w-10 h-10 rounded-lg flex items-center justify-center hover:bg-gray-300 transition-all cursor-pointer shadow-sm"
                    title="View Trash">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button id="close-trash-btn"
                    class="bg-white text-red-600 border-2 border-red-500 px-4 h-10 rounded-lg hover:bg-red-50 flex items-center gap-2 font-semibold transition-all text-sm shadow-sm"
                    style="display:none;" title="Exit Trash">
                    <i class="fas fa-trash-restore"></i>
                    Close Trash
                </button>
                <button id="refresh-btn"
                    class="bg-gray-200 text-gray-700 border border-slate-200 hover:bg-slate-50 w-10 h-10 rounded-lg flex items-center justify-center transition-all duration-150 active:scale-95 cursor-pointer shadow-sm"
                    title="Refresh (Ctrl+R)">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Layout Wrapper -->
    <div class="flex pt-24 h-screen w-full overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar bg-white h-full flex flex-col border-r border-gray-200 flex-shrink-0 no-select">
            <nav class="flex-1 p-4 overflow-y-auto" id="sidebar-nav">
                <!-- Sidebar contents populated dynamically by globalScript.ts -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow overflow-hidden flex flex-col h-[calc(100vh-6rem)]">

            <!-- Home Section -->
            <div id="home" class="flex-1 flex flex-col min-h-0 overflow-hidden">
                <!-- Vouchers List -->
                <section class="bg-white shadow-sm border border-slate-200 overflow-hidden flex-1 flex flex-col min-h-0">
                    <div class="px-6 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-100 bg-slate-50/50 flex-shrink-0">
                        <h2 class="text-sm font-bold text-slate-500" id="list-subtitle">All Custom Letters & Documents</h2>
                        
                        <!-- Search wrapper -->
                        <div class="flex items-center gap-3 max-w-md w-full" id="search-wrapper">
                            <div class="relative flex-1">
                                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input type="text" id="search-input" placeholder="Search documents... (Ctrl+F)" autocomplete="off"
                                    class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm bg-white">
                            </div>
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="hidden md:block overflow-x-auto overflow-y-auto flex-1 min-h-0">
                        <table class="w-full text-sm border-collapse">
                            <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                                <tr class="text-slate-700 border-b border-slate-200 font-semibold">
                                    <th class="px-6 py-4 text-left">Doc No.</th>
                                    <th class="px-6 py-4 text-left">Date</th>
                                    <th class="px-6 py-4 text-left">Title / Subject</th>
                                    <th class="px-6 py-4 text-left">Recipient</th>
                                    <th class="px-6 py-4 text-right pr-12">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="document-tbody">
                                <tr>
                                    <td colspan="5" class="w-full px-4 py-12 flex flex-col items-center justify-center text-slate-400">
                                        <i class="fas fa-spinner fa-spin text-3xl mb-2 text-blue-500"></i>
                                        <p>Loading documents...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Mobile view layout -->
                    <div id="document-cards-mobile" class="block md:hidden space-y-3 p-4 bg-slate-50 overflow-y-auto flex-1 min-h-0">
                        <!-- Populated dynamically -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../../dist/public/ts/shared/core/utils.js"></script>
    <script src="../../dist/public/ts/shared/core/ipc.js"></script>
    <script src="../../dist/public/ts/shared/documents/documentManager.js"></script>
    <script src="../../dist/public/ts/shared/core/globalScript.js"></script>
    <script src="../../dist/public/document/src/services/documentApi.js"></script>
    <script src="../../dist/public/document/src/main.js"></script>
</body>

</html>
