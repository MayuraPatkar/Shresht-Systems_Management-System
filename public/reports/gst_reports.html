<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GST Reports</title>
<link rel="stylesheet" href="../css/tailwind.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>body{font-family:Inter,sans-serif;overflow:hidden;user-select:none}.sidebar{width:240px}select{user-select:text}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#2563eb;border-radius:4px}.report-table th{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#64748b;padding:.8rem 1rem;text-align:right}.report-table th:first-child,.report-table th:nth-child(2){text-align:left}.report-table td{padding:.8rem 1rem;border-top:1px solid #f1f5f9}</style>
</head><body class="bg-slate-100">
<header class="fixed top-0 left-0 right-0 bg-white border-b border-slate-200 z-30 h-24 flex items-center px-4"><div class="flex items-center justify-between w-full"><div class="flex items-center gap-3"><img src="../assets/icon.png" class="h-10 w-10 object-contain" alt="Icon"><div><h1 class="text-xl font-bold text-slate-800">GST Reports</h1><p id="gst-page-subtitle" class="text-xs text-slate-500 font-medium">Sales output-tax summary and breakdown</p></div></div><div class="flex items-center gap-3"><label class="text-xs font-bold text-slate-500 uppercase">Report Type <select id="gst-report-type" class="ml-2 min-w-48 px-3 py-2.5 border border-slate-300 rounded-lg bg-white text-sm font-semibold text-slate-700 normal-case"><option value="sales">Sales GST Report</option><option value="purchase">Purchase GST Report</option></select></label><button id="home-btn" class="bg-gray-600 text-white px-4 h-10 rounded-lg hover:bg-gray-700 flex items-center gap-2 font-medium text-sm"><i class="fas fa-home"></i>Home</button></div></div></header>
<div class="flex pt-24 h-screen overflow-hidden"><aside class="sidebar bg-white h-full border-r border-slate-200 flex-shrink-0"><nav class="p-4 h-full overflow-y-auto" id="sidebar-nav"></nav></aside><main class="flex-1 h-full overflow-y-auto p-6 lg:p-8">

<section id="sales-gst-panel">
<div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6"><div class="flex items-center gap-2 border-b border-slate-100 pb-3 mb-5"><i class="fas fa-calendar-alt text-blue-600"></i><h2 class="text-sm font-bold uppercase tracking-wider text-slate-800">Sales GST Period</h2></div><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><label class="text-xs font-semibold text-slate-600">Month<select id="gst-month" class="mt-1.5 w-full px-3 py-2.5 border rounded-lg bg-white"></select></label><label class="text-xs font-semibold text-slate-600">Year<select id="gst-year" class="mt-1.5 w-full px-3 py-2.5 border rounded-lg bg-white"></select></label><div class="flex items-end"><button id="generate-gst-report" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold"><i class="fas fa-search mr-2"></i>Generate Sales GST</button></div></div></div>
<div id="gst-report-summary" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" style="display:none"></div><div id="sales-breakdown-host"></div><div id="sales-details-host"></div>
</section>

<section id="purchase-gst-panel" class="hidden">
<div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6"><div class="flex items-center gap-2 border-b border-slate-100 pb-3 mb-5"><i class="fas fa-calendar-alt text-orange-600"></i><h2 class="text-sm font-bold uppercase tracking-wider text-slate-800">Purchase GST Period</h2></div><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><label class="text-xs font-semibold text-slate-600">Month<select id="purchase-gst-month" class="mt-1.5 w-full px-3 py-2.5 border rounded-lg bg-white"></select></label><label class="text-xs font-semibold text-slate-600">Year<select id="purchase-gst-year" class="mt-1.5 w-full px-3 py-2.5 border rounded-lg bg-white"></select></label><div class="flex items-end"><button id="generate-purchase-gst-report" class="w-full bg-orange-600 hover:bg-orange-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold"><i class="fas fa-search mr-2"></i>Generate Purchase GST</button></div></div></div>
<div id="purchase-gst-report-summary" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" style="display:none"></div><div id="purchase-breakdown-host"></div><div id="purchase-details-host"></div>
</section>
</main></div>
<script src="../../dist/public/ts/shared/core/globalScript.js"></script><script src="../../dist/public/ts/shared/core/utils.js"></script><script src="../../dist/public/ts/shared/core/ipc.js"></script><script src="../../dist/public/ts/shared/config/companyConfig.js"></script><script src="../../dist/public/reports/src/types/reports.types.js"></script><script src="../../dist/public/reports/src/services/reportsApi.js"></script><script src="../../dist/public/reports/src/utils/reportsUtils.js"></script><script src="../../dist/public/reports/src/components/gstReport.js"></script><script src="../../dist/public/reports/src/components/purchaseGstReport.js"></script><script src="../../dist/public/reports/src/gstReportsMain.js"></script>
</body></html>
