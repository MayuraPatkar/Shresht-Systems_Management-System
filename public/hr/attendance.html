<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Attendance Registry</title>
    <link rel="stylesheet" href="../css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Inter, sans-serif; overflow: hidden; user-select: none; }
        .sidebar { width: 240px; }
        input, select { user-select: text; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100">
    <header class="fixed top-0 left-0 right-0 bg-white border-b border-slate-200 z-30 h-24 flex items-center px-4">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-3">
                <img src="../assets/icon.png" class="h-10 w-10 object-contain" alt="Icon">
                <div>
                    <h1 class="text-xl font-bold text-slate-800">Attendance Register</h1>
                    <p class="text-xs text-slate-500 font-medium">Record work days, check-in schedules, and overtime hours</p>
                </div>
            </div>
            <button id="refresh-btn" class="bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 w-10 h-10 rounded-lg shadow-sm flex items-center justify-center">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>
    <div class="flex pt-24 h-screen w-full overflow-hidden">
        <aside class="sidebar bg-white h-full flex flex-col border-r border-slate-200 flex-shrink-0">
            <nav class="flex-1 p-4 overflow-y-auto" id="sidebar-nav"></nav>
        </aside>
        <main class="flex-1 h-full overflow-y-auto p-6 lg:p-8 flex flex-col gap-6">
            <!-- Filter Section -->
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex-shrink-0">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-1">Today's Ledger Date</h2>
                        <p class="text-xs text-slate-500" id="current-date-label">June 29, 2026</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <label class="text-xs font-semibold text-slate-600 flex items-center gap-2">
                            Select Date
                            <input type="date" id="attendance-date" class="px-3 py-1.5 border border-slate-300 rounded-lg outline-none text-xs font-medium bg-slate-50">
                        </label>
                    </div>
                </div>
            </section>

            <!-- Employee Attendance Form Table -->
            <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex-1 flex flex-col min-h-0">
                <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
                    <div>
                        <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Record Shift Status</h2>
                        <p class="text-xs text-slate-500 mt-1">Mark present/absent and check-in times</p>
                    </div>
                </div>
                <div class="overflow-auto flex-1">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                            <tr>
                                <th class="px-6 py-3 text-xs font-semibold uppercase text-slate-600">Employee ID</th>
                                <th class="px-6 py-3 text-xs font-semibold uppercase text-slate-600">Name</th>
                                <th class="px-6 py-3 text-xs font-semibold uppercase text-slate-600 text-center">Status</th>
                                <th class="px-6 py-3 text-xs font-semibold uppercase text-slate-600">Start Time</th>
                                <th class="px-6 py-3 text-xs font-semibold uppercase text-slate-600">End Time</th>
                                <th class="px-6 py-3 text-xs font-semibold uppercase text-slate-600 text-right pr-8">Action</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-tbody" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="6" class="px-6 py-14 text-center text-slate-400">
                                    <i class="fas fa-users-cog text-4xl text-slate-300 mb-3 block"></i>
                                    Loading registered employees...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../dist/public/ts/shared/core/globalScript.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('attendance-date').value = todayStr;
            document.getElementById('current-date-label').textContent = new Date().toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            loadEmployees();
            document.getElementById('refresh-btn').addEventListener('click', loadEmployees);
            document.getElementById('attendance-date').addEventListener('change', (e) => {
                const selected = new Date(e.target.value);
                document.getElementById('current-date-label').textContent = selected.toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
            });
        });

        async function loadEmployees() {
            try {
                const res = await fetch('/employee/getEmployees');
                const data = await res.json();
                if (data && data.employees) {
                    renderAttendanceRows(data.employees);
                }
            } catch (err) {
                console.error("Failed to load staff:", err);
            }
        }

        function renderAttendanceRows(employees) {
            const tbody = document.getElementById('attendance-tbody');
            if (employees.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-14 text-center text-slate-400">
                            No registered employees found. Register staff first.
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = employees.map(emp => `
                <tr class="hover:bg-slate-50" id="row-${emp.emp_id}">
                    <td class="px-6 py-4 font-semibold text-slate-600">EMP-${emp.emp_id}</td>
                    <td class="px-6 py-4 font-bold text-slate-800">${emp.name}</td>
                    <td class="px-6 py-4 text-center">
                        <label class="inline-flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" checked id="status-${emp.emp_id}" class="sr-only peer status-checkbox" data-id="${emp.emp_id}">
                            <div class="px-3 py-1 rounded-full border text-xs font-bold transition-all peer-checked:bg-green-50 peer-checked:text-green-700 peer-checked:border-green-200 bg-red-50 text-red-700 border-red-200">
                                <span class="peer-checked:hidden">Absent</span>
                                <span class="hidden peer-checked:inline">Present</span>
                            </div>
                        </label>
                    </td>
                    <td class="px-6 py-4">
                        <input type="time" id="start-${emp.emp_id}" value="09:00" class="px-2 py-1 border border-slate-200 rounded text-xs bg-slate-50 outline-none">
                    </td>
                    <td class="px-6 py-4">
                        <input type="time" id="end-${emp.emp_id}" value="18:00" class="px-2 py-1 border border-slate-200 rounded text-xs bg-slate-50 outline-none">
                    </td>
                    <td class="px-6 py-4 text-right pr-8">
                        <button class="btn-save-attendance bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm" data-id="${emp.emp_id}">
                            Submit
                        </button>
                    </td>
                </tr>
            `).join('');

            // Delegating change listener for checkboxes
            tbody.onchange = (e) => {
                if (e.target.classList.contains('status-checkbox')) {
                    toggleRowTime(e.target.getAttribute('data-id'));
                }
            };

            // Delegating click listener for buttons
            tbody.onclick = (e) => {
                const btn = e.target.closest('.btn-save-attendance');
                if (btn) {
                    saveAttendance(btn.getAttribute('data-id'));
                }
            };
        }

        function toggleRowTime(empId) {
            const checked = document.getElementById(`status-${empId}`).checked;
            document.getElementById(`start-${empId}`).disabled = !checked;
            document.getElementById(`end-${empId}`).disabled = !checked;
        }

        async function saveAttendance(empId) {
            const present = document.getElementById(`status-${empId}`).checked;
            const start_time = document.getElementById(`start-${empId}`).value;
            const end_time = document.getElementById(`end-${empId}`).value;
            const date = document.getElementById('attendance-date').value;

            try {
                const res = await fetch('/employee/markAttendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emp_id: empId, present, start_time, end_time, date })
                });

                if (res.ok) {
                    alert(`Attendance recorded for EMP-${empId}!`);
                } else {
                    const err = await res.json();
                    alert(err.message || 'Submission failed');
                }
            } catch (err) {
                alert('Connection error');
            }
        }
    </script>
</body>
</html>
