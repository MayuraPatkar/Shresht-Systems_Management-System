<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>
    <link rel="stylesheet" href="../css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Inter, sans-serif; overflow: hidden; user-select: none; }
        .sidebar { width: 240px; height: 100%; overflow-y: auto; overflow-x: hidden; }
        main { height: 100%; overflow: hidden; }
        input, select, textarea { user-select: text !important; }
        button { cursor: pointer !important; }
        
        /* Premium Modal overlay & animations */
        .modal-overlay {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-card-premium {
            border-radius: 12px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(15, 23, 42, 0.05) !important;
            border: 1px solid rgba(226, 232, 240, 0.8) !important;
            animation: premiumModalShow 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes premiumModalShow {
            from { opacity: 0; transform: scale(0.985); }
            to { opacity: 1; transform: scale(1); }
        }
        .form-input-premium {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.875rem;
            line-height: 1.25rem;
            color: #0f172a;
            padding: 0.5rem 0.75rem;
            transition: all 0.15s ease-in-out;
            width: 100%;
        }
        .form-input-premium:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .form-section-header {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.75rem;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid #f1f5f9;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100">
    <header class="fixed top-0 left-0 right-0 bg-white border-b border-slate-200 z-30 h-24 flex items-center px-4">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-3">
                <img src="../assets/icon.png" class="h-10 w-10 object-contain" alt="Icon">
                <div>
                    <h1 class="text-xl font-bold text-slate-800">Employee Management</h1>
                    <p class="text-xs text-slate-500 font-medium">Search, filter, and review corporate members</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-add-employee" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm flex items-center gap-2 transition-colors cursor-pointer">
                    <i class="fas fa-plus"></i> Add Employee
                </button>
                <button id="refresh-btn" class="bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 w-10 h-10 rounded-lg shadow-sm flex items-center justify-center">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
    </header>
    
    <div class="flex pt-24 h-screen w-full overflow-hidden">
        <aside class="sidebar bg-white h-full flex flex-col border-r border-slate-200 flex-shrink-0">
            <nav class="flex-1 p-4 overflow-y-auto" id="sidebar-nav"></nav>
        </aside>
        
        <main class="flex-1 h-full flex flex-col min-w-0 bg-slate-50">
            <!-- Table Action Controls -->
            <div class="px-6 py-4 bg-white border-b border-slate-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4 flex-shrink-0">
                <div class="flex items-center gap-3">
                </div>
                <!-- Search bar -->
                <div class="flex items-center gap-3 max-w-md w-full">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="employee-search" placeholder="Search by name, email or phone..."
                            class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm bg-white">
                    </div>
                </div>
            </div>

            <!-- Table Area -->
            <div class="flex-1 overflow-auto bg-white min-h-0">
                <table class="w-full text-sm border-collapse text-left">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                        <tr class="text-slate-700 font-semibold border-b border-slate-200">
                            <th class="px-6 py-3.5 text-xs uppercase tracking-wider">Employee ID</th>
                            <th class="px-6 py-3.5 text-xs uppercase tracking-wider">Name</th>
                            <th class="px-6 py-3.5 text-xs uppercase tracking-wider">Contact Info</th>
                            <th class="px-6 py-3.5 text-xs uppercase tracking-wider">Address</th>
                            <th class="px-6 py-3.5 text-xs uppercase tracking-wider text-right">Base Salary</th>
                            <th class="px-6 py-3.5 text-xs uppercase tracking-wider text-center">Status</th>
                            <th class="px-6 py-3.5 text-xs uppercase tracking-wider text-right pr-10">Action</th>
                        </tr>
                    </thead>
                    <tbody id="employee-list-tbody" class="divide-y divide-slate-100 text-xs">
                        <tr>
                            <td colspan="7" class="px-6 py-20 text-center text-slate-400">
                                <i class="fas fa-spinner fa-spin text-3xl text-blue-600 mb-3 block"></i>
                                Loading employees...
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <!-- Empty State -->
                <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                    <i class="fas fa-users text-5xl text-slate-300 mb-3"></i>
                    <p class="text-lg font-bold text-slate-700">No Employees Found</p>
                    <p class="text-xs text-slate-500 mt-1">Try adjusting your search query</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div id="employee-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm flex items-center justify-center p-4 modal-overlay">
            <div class="bg-white modal-card-premium w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden">
                <!-- Modal Header -->
                <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-white flex-shrink-0">
                    <h2 id="modal-title" class="text-base font-semibold text-slate-950">Register Employee</h2>
                    <button id="close-modal-btn" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-slate-50 transition-colors">
                        <i class="fas fa-times text-base"></i>
                    </button>
                </div>
                
                <form id="employee-form" class="flex flex-col flex-1 min-h-0">
                    <!-- Form inputs -->
                    <div class="overflow-y-auto p-6 space-y-5 flex-1">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div class="space-y-4">
                                <h3 class="form-section-header">Basic Details</h3>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Full Name <span class="text-red-500">*</span></label>
                                    <input type="text" id="form-name" required placeholder="Enter full name" class="form-input-premium">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Email Address <span class="text-red-500">*</span></label>
                                    <input type="email" id="form-email" required placeholder="name@company.com" class="form-input-premium">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Phone Number <span class="text-red-500">*</span></label>
                                    <input type="text" id="form-phone" required placeholder="Phone number" class="form-input-premium">
                                </div>
                            </div>
                            
                            <div class="space-y-4">
                                <h3 class="form-section-header">Financials</h3>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Base Salary (Monthly INR) <span class="text-red-500">*</span></label>
                                    <input type="number" id="form-salary" required placeholder="e.g. 30000" class="form-input-premium">
                                </div>
                            </div>
                        </div>
                        
                        <div class="space-y-4 mt-4">
                            <h3 class="form-section-header">Address Details</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Address Line 1 <span class="text-red-500">*</span></label>
                                    <input type="text" id="form-line1" required placeholder="House/Flat No, Building, Street" class="form-input-premium">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Address Line 2</label>
                                    <input type="text" id="form-line2" placeholder="Landmark, Locality" class="form-input-premium">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">City <span class="text-red-500">*</span></label>
                                    <input type="text" id="form-city" required placeholder="City" class="form-input-premium">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-[11px] font-semibold text-slate-600 mb-1">State <span class="text-red-500">*</span></label>
                                        <input type="text" id="form-state" required value="Karnataka" class="form-input-premium">
                                    </div>
                                    <div>
                                        <label class="block text-[11px] font-semibold text-slate-600 mb-1">Pincode <span class="text-red-500">*</span></label>
                                        <input type="text" id="form-pincode" required placeholder="Pincode" class="form-input-premium">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="space-y-4 mt-4">
                            <h3 class="form-section-header">Bank Details</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Account Holder Name</label>
                                    <input type="text" id="form-bank-holder" placeholder="Account Holder Name" class="form-input-premium">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Bank Name</label>
                                    <input type="text" id="form-bank-name" placeholder="e.g. State Bank of India" class="form-input-premium">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-semibold text-slate-600 mb-1">Account Number</label>
                                    <input type="text" id="form-bank-account" placeholder="Account Number" class="form-input-premium">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-[11px] font-semibold text-slate-600 mb-1">IFSC Code</label>
                                        <input type="text" id="form-bank-ifsc" placeholder="IFSC Code" class="form-input-premium">
                                    </div>
                                    <div>
                                        <label class="block text-[11px] font-semibold text-slate-600 mb-1">Branch Name</label>
                                        <input type="text" id="form-bank-branch" placeholder="Branch Name" class="form-input-premium">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Modal Footer -->
                    <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex items-center justify-end gap-3 flex-shrink-0">
                        <button type="button" id="btn-cancel-modal" class="px-4 py-2 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-100 hover:text-slate-900 text-xs font-semibold">
                            Cancel
                        </button>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-xs font-semibold shadow-sm flex items-center gap-1.5">
                            <i class="fas fa-check"></i> Register Staff
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../dist/public/ts/shared/core/globalScript.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadEmployees();
            
            document.getElementById('refresh-btn').addEventListener('click', loadEmployees);
            document.getElementById('btn-add-employee').addEventListener('click', openModal);
            document.getElementById('close-modal-btn').addEventListener('click', closeModal);
            document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
            document.getElementById('employee-form').addEventListener('submit', handleFormSubmit);
            document.getElementById('employee-search').addEventListener('input', filterEmployees);
        });

        let employeesList = [];

        async function loadEmployees() {
            try {
                const tbody = document.getElementById('employee-list-tbody');
                const res = await fetch('/employee/getEmployees');
                const data = await res.json();
                if (data && data.employees) {
                    employeesList = data.employees;
                    renderEmployeesTable(employeesList);
                }
            } catch (err) {
                console.error("Failed to fetch employees:", err);
            }
        }

        function formatAddress(address) {
            if (!address) return '';
            if (typeof address === 'string') return address;
            return [address.line1, address.line2, address.city, address.state, address.pincode].filter(Boolean).join(', ');
        }

        function renderEmployeesTable(list) {
            const tbody = document.getElementById('employee-list-tbody');
            const emptyState = document.getElementById('empty-state');
            
            if (list.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            tbody.innerHTML = list.map(emp => `
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 cursor-pointer" data-id="${emp._id || emp.emp_id}">
                    <td class="px-6 py-4 font-semibold text-slate-500">EMP-${emp.emp_id}</td>
                    <td class="px-6 py-4 font-bold text-slate-800">${emp.name}</td>
                    <td class="px-6 py-4">
                        <div class="text-slate-800 font-medium">${emp.email}</div>
                        <div class="text-slate-400 mt-0.5">${emp.phone}</div>
                    </td>
                    <td class="px-6 py-4 text-slate-500 max-w-xs truncate">${formatAddress(emp.address)}</td>
                    <td class="px-6 py-4 text-right font-bold text-slate-800">₹${Number(emp.salary).toLocaleString('en-IN')}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2.5 py-1 rounded-full text-[10px] font-bold ${emp.is_active !== false ? 'bg-green-50 text-green-700 border border-green-150' : 'bg-slate-100 text-slate-600'}">
                            ${emp.is_active !== false ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right pr-10 action-cell">
                        <button class="btn-view-details text-blue-600 hover:text-blue-800 font-semibold hover:underline" data-id="${emp._id || emp.emp_id}">
                            View Details <i class="fas fa-chevron-right ml-1"></i>
                        </button>
                    </td>
                </tr>
            `).join('');

            // Bind click events on the tbody using event delegation
            tbody.onclick = (e) => {
                const tr = e.target.closest('tr');
                if (!tr) return;
                
                if (e.target.closest('.action-cell')) {
                    e.stopPropagation();
                    const btn = e.target.closest('.btn-view-details');
                    if (btn) {
                        viewDetails(btn.getAttribute('data-id'));
                    }
                    return;
                }
                
                viewDetails(tr.getAttribute('data-id'));
            };
        }

        function openModal() {
            document.getElementById('employee-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('employee-modal').classList.add('hidden');
            document.getElementById('employee-form').reset();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('form-name').value.trim();
            const email = document.getElementById('form-email').value.trim();
            const phone = document.getElementById('form-phone').value.trim();
            const salary = Number(document.getElementById('form-salary').value.trim());
            
            const address = {
                line1: document.getElementById('form-line1').value.trim(),
                line2: document.getElementById('form-line2').value.trim(),
                city: document.getElementById('form-city').value.trim(),
                state: document.getElementById('form-state').value.trim(),
                pincode: document.getElementById('form-pincode').value.trim()
            };

            const bank_details = {
                account_holder_name: document.getElementById('form-bank-holder').value.trim(),
                bank_name: document.getElementById('form-bank-name').value.trim(),
                account_number: document.getElementById('form-bank-account').value.trim(),
                ifsc_code: document.getElementById('form-bank-ifsc').value.trim(),
                branch: document.getElementById('form-bank-branch').value.trim()
            };

            try {
                const res = await fetch('/employee/addEmp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, address, salary, bank_details })
                });

                if (res.ok) {
                    alert('Employee registered successfully!');
                    closeModal();
                    loadEmployees();
                } else {
                    const err = await res.json();
                    alert(err.message || 'Registration failed');
                }
            } catch (err) {
                alert('Connection error');
            }
        }

        function filterEmployees() {
            const query = document.getElementById('employee-search').value.toLowerCase();
            const filtered = employeesList.filter(emp => 
                emp.name.toLowerCase().includes(query) || 
                emp.email.toLowerCase().includes(query) || 
                String(emp.emp_id).includes(query) || 
                emp.phone.includes(query)
            );
            renderEmployeesTable(filtered);
        }

        function viewDetails(id) {
            window.location.href = `/employee/details?id=${id}`;
        }
    </script>
</body>
</html>
